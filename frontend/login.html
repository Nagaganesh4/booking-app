<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CineBook</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="glass-card auth-card">
      <div class="text-center mb-2">
        <a href="/" class="logo font-display" style="font-size:2rem;letter-spacing:3px;justify-content:center;display:flex;gap:10px;align-items:center;">
          <span>🎬</span> CINEBOOK
        </a>
      </div>
      <h2>Welcome Back</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="login-btn">Login</button>
      </form>
      <div class="footer-link">
        Don't have an account? <a href="/register.html">Sign Up</a>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      btn.disabled = true;
      btn.textContent = "Logging in...";
      try {
        const data = await api.post("/auth/login", {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        });
        api.setToken(data.token);
        api.setUser(data.user);
        showToast("Login successful!", "success");
        setTimeout(() => window.location.href = "/", 500);
      } catch (err) {
        showToast(err.message, "error");
        btn.disabled = false;
        btn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
