<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — CineBook</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="glass-card auth-card">
      <div class="text-center mb-2">
        <span style="font-size:2.5rem;">🔐</span>
      </div>
      <h2>Admin Access</h2>
      <form id="admin-login-form">
        <div class="form-group">
          <label for="email">Admin Email</label>
          <input type="email" id="email" class="form-control" placeholder="admin@cinema.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="login-btn">Access Dashboard</button>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    // If already logged in as admin, redirect
    if (api.isAdmin()) window.location.href = "/admin-x9k2/dashboard.html";

    document.getElementById("admin-login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      btn.disabled = true; btn.textContent = "Verifying...";
      try {
        const data = await api.post("/auth/login", {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        });
        if (data.user.role !== "admin") throw new Error("Not an admin account");
        api.setToken(data.token);
        api.setUser(data.user);
        window.location.href = "/admin-x9k2/dashboard.html";
      } catch (err) {
        showToast(err.message, "error");
        btn.disabled = false; btn.textContent = "Access Dashboard";
      }
    });
  </script>
</body>
</html>
