<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Shows — Admin</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/admin-x9k2/css/admin.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-logo"><h2 style="display:flex;align-items:center;gap:8px;"><i data-lucide="film"></i> CineBook</h2><small>Admin Panel</small></div>
      <nav>
        <a href="/admin-x9k2/dashboard.html"><span><i data-lucide="bar-chart-2" style="width:18px;"></i></span><span>Dashboard</span></a>
        <a href="/admin-x9k2/movies.html"><span><i data-lucide="film" style="width:18px;"></i></span><span>Movies</span></a>
        <a href="/admin-x9k2/theaters.html"><span><i data-lucide="building" style="width:18px;"></i></span><span>Theaters</span></a>
        <a href="/admin-x9k2/shows.html" class="active"><span><i data-lucide="monitor-play" style="width:18px;"></i></span><span>Shows</span></a>
        <a href="/admin-x9k2/bookings.html"><span><i data-lucide="ticket" style="width:18px;"></i></span><span>Bookings</span></a>
      </nav>
      <div class="sidebar-footer"><button class="btn btn-sm btn-ghost" style="width:100%;" onclick="api.logout()"><i data-lucide="log-out" style="width:16px;height:16px;"></i> Logout</button></div>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>🎭 Schedule Shows</h1>
        <button class="btn btn-primary" onclick="showForm()">+ Add Show</button>
      </div>

      <div class="glass-card" id="form-card" style="display:none;padding:2rem;margin-bottom:2rem;">
        <h3>Schedule a New Show</h3>
        <form id="show-form" class="admin-form" style="margin-top:1rem;">
          <div class="form-row">
            <div class="form-group"><label>Movie *</label><select id="f-movie" class="form-control" required><option value="">Select Movie</option></select></div>
            <div class="form-group"><label>Theater *</label><select id="f-theater" class="form-control" required><option value="">Select Theater</option></select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Screen No</label><input type="number" id="f-screen" class="form-control" value="1" min="1"></div>
            <div class="form-group"><label>Price (₹)</label><input type="number" id="f-price" class="form-control" value="200" min="1"></div>
          </div>
          <div class="form-group"><label>Date & Time *</label><input type="datetime-local" id="f-datetime" class="form-control" required></div>
          <div style="display:flex;gap:1rem;margin-top:1rem;">
            <button type="submit" class="btn btn-primary" id="save-btn">Schedule Show</button>
            <button type="button" class="btn btn-ghost" onclick="document.getElementById('form-card').style.display='none'">Cancel</button>
          </div>
        </form>
      </div>

      <table class="admin-table">
        <thead><tr><th>Movie</th><th>Theater</th><th>Screen</th><th>Date & Time</th><th>Price</th><th>Actions</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="6" style="text-align:center;">Loading...</td></tr></tbody>
      </table>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!api.isAdmin()) window.location.href = "/admin-x9k2/login.html";

    let movies = [], theaters = [];

    async function init() {
      try {
        movies = await api.get("/movies/");
        theaters = await api.get("/theaters");
        const mSel = document.getElementById("f-movie");
        movies.forEach(m => { const o = document.createElement("option"); o.value = m.id; o.textContent = m.title; mSel.appendChild(o); });
        const tSel = document.getElementById("f-theater");
        theaters.forEach(t => { const o = document.createElement("option"); o.value = t.id; o.textContent = `${t.name} — ${t.city}`; tSel.appendChild(o); });
      } catch (e) {}
      loadShows();
    }

    function showForm() { document.getElementById("form-card").style.display = "block"; }

    async function loadShows() {
      try {
        const shows = await api.get("/shows");
        const tbody = document.getElementById("tbody");
        if (shows.length === 0) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">No shows scheduled</td></tr>`; return; }
        tbody.innerHTML = shows.map(s => {
          const dt = s.datetime ? new Date(s.datetime) : null;
          const dateStr = dt ? dt.toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" }) : "—";
          const timeStr = dt ? dt.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }) : "";
          return `
            <tr>
              <td style="font-weight:600;">${s.movie_title}</td>
              <td>${s.theater_name}<br><small style="color:var(--text-muted);">${s.theater_city}</small></td>
              <td>Screen ${s.screen_no}</td>
              <td>${dateStr}<br><small style="color:var(--accent-gold);">${timeStr}</small></td>
              <td style="color:var(--accent-gold);font-weight:600;">₹${s.price}</td>
              <td><button class="btn btn-sm btn-danger" onclick="deleteShow('${s.id}')">Delete</button></td>
            </tr>`;
        }).join("");
      } catch (e) { showToast(e.message, "error"); }
    }

    document.getElementById("show-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("save-btn");
      btn.disabled = true;
      try {
        await api.post("/shows", {
          movie_id: document.getElementById("f-movie").value,
          theater_id: document.getElementById("f-theater").value,
          screen_no: parseInt(document.getElementById("f-screen").value),
          price: parseFloat(document.getElementById("f-price").value),
          datetime: document.getElementById("f-datetime").value,
        });
        showToast("Show scheduled!", "success");
        document.getElementById("form-card").style.display = "none";
        loadShows();
      } catch (err) { showToast(err.message, "error"); }
      btn.disabled = false;
    });

    async function deleteShow(id) {
      if (!confirm("Delete this show?")) return;
      try { await api.delete(`/shows/${id}`); showToast("Show deleted", "success"); loadShows(); }
      catch (e) { showToast(e.message, "error"); }
    }

    init();
  </script>
  <script>lucide.createIcons();</script>
</body>
</html>
