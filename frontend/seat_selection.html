<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Seats — CineBook</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/seat.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo"><span class="icon">🎬</span><span>CINEBOOK</span></a>
      <div class="nav-links">
        <a href="/">Movies</a>
        <a href="/my_bookings.html">My Bookings</a>
        <div id="auth-links"></div>
      </div>
    </div>
  </nav>

  <div class="seat-page" id="seat-page">
    <div class="spinner"></div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const showId = new URLSearchParams(window.location.search).get("show_id");
    let selectedSeats = [];
    let showData = null;

    async function loadSeatMap() {
      if (!showId) { window.location.href = "/"; return; }
      if (!api.isLoggedIn()) { window.location.href = "/login.html"; return; }

      try {
        showData = await api.get(`/shows/${showId}/seats`);
        renderSeatMap();
      } catch (e) {
        document.getElementById("seat-page").innerHTML = `<p style="color:var(--accent-red);text-align:center;margin-top:4rem;">${e.message}</p>`;
      }
    }

    function renderSeatMap() {
      const page = document.getElementById("seat-page");
      const dt = showData.datetime ? new Date(showData.datetime) : null;
      const dateStr = dt ? dt.toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long", year: "numeric" }) : "TBD";
      const timeStr = dt ? dt.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }) : "";

      const rows = showData.rows || 8;
      const cols = showData.cols || 10;
      const rowLabels = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      let gridHTML = "";
      for (let r = 0; r < rows; r++) {
        let rowHTML = `<div class="seat-row"><span class="seat-row-label">${rowLabels[r]}</span>`;
        for (let c = 1; c <= cols; c++) {
          const seatId = `${rowLabels[r]}${c}`;
          const seatInfo = showData.seats.find(s => s.seat === seatId);
          const status = seatInfo ? seatInfo.status : "available";
          const isSelected = selectedSeats.includes(seatId);
          const cls = isSelected ? "selected" : status;
          const disabled = status === "booked" || status === "locked" ? "disabled" : "";
          rowHTML += `<button class="seat ${cls}" data-seat="${seatId}" ${disabled} onclick="toggleSeat('${seatId}', '${status}')">${c}</button>`;
        }
        rowHTML += `<span class="seat-row-label">${rowLabels[r]}</span></div>`;
        gridHTML += rowHTML;
      }

      page.innerHTML = `
        <div class="show-info">
          <h2>${showData.movie_title}</h2>
          <div class="details">
            <span>🏢 ${showData.theater_name}</span>
            <span>📍 ${showData.theater_city}</span>
            <span>🖥 Screen ${showData.screen_no}</span>
            <span>📅 ${dateStr}</span>
            <span>🕐 ${timeStr}</span>
          </div>
        </div>

        <div class="screen-indicator">
          <div class="screen-shape"></div>
          <span>SCREEN</span>
        </div>

        <div class="seat-grid-wrapper">
          <div class="seat-grid" id="seat-grid">${gridHTML}</div>
        </div>

        <div class="seat-legend">
          <div class="legend-item"><div class="legend-box available-legend"></div><span>Available</span></div>
          <div class="legend-item"><div class="legend-box selected-legend"></div><span>Selected</span></div>
          <div class="legend-item"><div class="legend-box booked-legend"></div><span>Booked</span></div>
        </div>

        <div class="glass-card booking-summary" id="booking-summary" style="display:none;">
          <div class="summary-info">
            <h4>Selected Seats</h4>
            <div class="selected-seats" id="selected-seats-display"></div>
          </div>
          <div style="text-align:right;">
            <div class="total-label">Total Price</div>
            <div class="total-price" id="total-price">₹0</div>
          </div>
          <button class="btn btn-primary btn-lg" id="confirm-btn" onclick="confirmBooking()">Confirm Booking</button>
        </div>
      `;
    }

    function toggleSeat(seatId, status) {
      if (status === "booked" || status === "locked") return;
      const idx = selectedSeats.indexOf(seatId);
      if (idx > -1) {
        selectedSeats.splice(idx, 1);
      } else {
        if (selectedSeats.length >= 10) {
          showToast("Maximum 10 seats per booking", "error");
          return;
        }
        selectedSeats.push(seatId);
      }
      updateSeatUI();
    }

    function updateSeatUI() {
      document.querySelectorAll(".seat").forEach(btn => {
        const seatId = btn.dataset.seat;
        const seatInfo = showData.seats.find(s => s.seat === seatId);
        const status = seatInfo ? seatInfo.status : "available";
        if (status === "booked" || status === "locked") return;
        btn.className = `seat ${selectedSeats.includes(seatId) ? "selected" : "available"}`;
      });

      const summary = document.getElementById("booking-summary");
      if (selectedSeats.length > 0) {
        summary.style.display = "flex";
        document.getElementById("selected-seats-display").innerHTML =
          selectedSeats.sort().map(s => `<span class="seat-tag">${s}</span>`).join("");
        document.getElementById("total-price").textContent =
          `₹${selectedSeats.length * showData.price}`;
      } else {
        summary.style.display = "none";
      }
    }

    async function confirmBooking() {
      if (selectedSeats.length === 0) return;
      const btn = document.getElementById("confirm-btn");
      btn.disabled = true;
      btn.textContent = "Booking...";

      try {
        const result = await api.post("/bookings", {
          show_id: showId,
          seats: selectedSeats,
        });
        // Store confirmation data for the next page
        sessionStorage.setItem("booking_confirmation", JSON.stringify(result));
        window.location.href = "/booking_confirm.html";
      } catch (e) {
        showToast(e.message, "error");
        btn.disabled = false;
        btn.textContent = "Confirm Booking";
      }
    }

    loadSeatMap();
  </script>
</body>
</html>
