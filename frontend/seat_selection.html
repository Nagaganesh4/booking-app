<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Seats — CineBook</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/seat.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo"><span class="icon"><i data-lucide="film"></i></span><span>CINEBOOK</span></a>
      <div class="nav-links">
        <a href="/">Movies</a>
                <div id="auth-links"></div>
      </div>
    </div>
  </nav>

  <div class="seat-page" id="seat-page">
    <div class="spinner"></div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const showId = new URLSearchParams(window.location.search).get("show_id");
    let selectedSeats = [];
    let showData = null;

    async function loadSeatMap() {
      if (!showId) { window.location.href = "/"; return; }
      if (!api.isLoggedIn()) { window.location.href = "/login.html"; return; }

      try {
        showData = await api.get(`/shows/${showId}/seats`);
        renderSeatMap();
      } catch (e) {
        document.getElementById("seat-page").innerHTML = `<p style="color:var(--accent-red);text-align:center;margin-top:4rem;">${e.message}</p>`;
      }
    }

    function renderSeatMap() {
      const page = document.getElementById("seat-page");
      const dt = showData.datetime ? new Date(showData.datetime) : null;
      const dateStr = dt ? dt.toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long", year: "numeric" }) : "TBD";
      const timeStr = dt ? dt.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }) : "";

      const rows = showData.rows || 8;
      const cols = showData.cols || 10;
      const rowLabels = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      let gridHTML = "";
      for (let r = 0; r < rows; r++) {
        let rowHTML = `<div class="seat-row"><span class="seat-row-label">${rowLabels[r]}</span>`;
        for (let c = 1; c <= cols; c++) {
          const seatId = `${rowLabels[r]}${c}`;
          const seatInfo = showData.seats.find(s => s.seat === seatId);
          const status = seatInfo ? seatInfo.status : "available";
          const isSelected = selectedSeats.includes(seatId);
          const cls = isSelected ? "selected" : status;
          const disabled = status === "booked" || status === "locked" ? "disabled" : "";
          rowHTML += `<button class="seat ${cls}" data-seat="${seatId}" ${disabled} onclick="toggleSeat('${seatId}', '${status}')">${c}</button>`;
        }
        rowHTML += `<span class="seat-row-label">${rowLabels[r]}</span></div>`;
        gridHTML += rowHTML;
      }

      page.innerHTML = `
        <div class="show-info">
          <h2>${showData.movie_title}</h2>
          <div class="details">
            <span style="display:flex;align-items:center;gap:4px;"><i data-lucide="building" style="width:16px;"></i> ${showData.theater_name}</span>
            <span style="display:flex;align-items:center;gap:4px;"><i data-lucide="map-pin" style="width:16px;"></i> ${showData.theater_city}</span>
            <span style="display:flex;align-items:center;gap:4px;"><i data-lucide="monitor" style="width:16px;"></i> Screen ${showData.screen_no}</span>
            <span style="display:flex;align-items:center;gap:4px;"><i data-lucide="calendar" style="width:16px;"></i> ${dateStr}</span>
            <span style="display:flex;align-items:center;gap:4px;"><i data-lucide="clock" style="width:16px;"></i> ${timeStr}</span>
          </div>
        </div>

        <div class="screen-indicator">
          <div class="screen-shape"></div>
          <span>SCREEN</span>
        </div>

        <div class="seat-grid-wrapper">
          <div class="seat-grid" id="seat-grid">${gridHTML}</div>
        </div>

        <div class="seat-legend">
          <div class="legend-item"><div class="legend-box available-legend"></div><span>Available</span></div>
          <div class="legend-item"><div class="legend-box selected-legend"></div><span>Selected</span></div>
          <div class="legend-item"><div class="legend-box booked-legend"></div><span>Booked</span></div>
        </div>

        <div class="glass-card booking-summary" id="booking-summary" style="display:none;">
          <div class="summary-info">
            <h4>Selected Seats</h4>
            <div class="selected-seats" id="selected-seats-display"></div>
          </div>
          <div style="text-align:right;">
            <div class="total-label">Total Price</div>
            <div class="total-price" id="total-price">₹0</div>
          </div>
          <button class="btn btn-primary btn-lg" id="confirm-btn" onclick="openPaymentModal()">Proceed to Payment</button>
        </div>
      `;
    }

    /* ── Payment Modal UI ─────────────────────────────────────────────────── */
    const paymentModalHTML = `
      <div class="modal-backdrop hidden" id="payment-modal">
        <div class="modal glass-card" style="max-width: 400px; text-align: center;">
          <h3 style="display:flex; justify-content:space-between; align-items:center;">
            Complete Payment
            <span style="cursor:pointer; color:var(--text-muted);" onclick="closePaymentModal()">✕</span>
          </h3>
          <p class="text-muted" style="margin-bottom: 1.5rem; font-size: 0.9rem;">
            Scan the QR code below using any UPI app (GPay, PhonePe, Paytm) to pay securely.
          </p>
          
          <div style="background: white; padding: 1rem; border-radius: 8px; display: inline-block; margin-bottom: 1rem;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=9160068402@ybl%26pn=CineBook" alt="UPI QR Code" style="width: 200px; height: 200px;">
          </div>
          
          <p style="font-weight: 600; color: var(--accent-gold); margin-bottom: 0.5rem; font-size: 1.1rem;" id="pay-amount-display">Amount: ₹0</p>
          <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; letter-spacing: 1px;">UPI ID: <span style="color: white;">9160068402@ybl</span></p>

          <button class="btn btn-primary" id="pay-btn" style="width:100%;" onclick="processPayment()">
            I have completed the payment
          </button>
          
          <div id="payment-loader" class="hidden" style="text-align:center; padding: 1rem 0;">
            <div class="spinner" style="margin: 0 auto 1rem auto; width: 30px; height: 30px;"></div>
            <p style="color:var(--accent-gold); font-weight: 500;">Verifying Payment...</p>
            <p style="font-size: 0.8rem; color:var(--text-muted);">Please wait, do not close this window.</p>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', paymentModalHTML);

    function openPaymentModal() {
      if (selectedSeats.length === 0) return;
      document.getElementById("pay-amount-display").textContent = `Amount: ₹${selectedSeats.length * showData.price}`;
      document.getElementById("payment-modal").classList.remove("hidden");
    }

    function closePaymentModal() {
      if (document.getElementById("pay-btn").disabled) return; // Prevent closing while processing
      document.getElementById("payment-modal").classList.add("hidden");
    }

    async function processPayment() {
      const payBtn = document.getElementById("pay-btn");
      const loader = document.getElementById("payment-loader");
      
      // Hide button, show loader
      payBtn.style.display = "none";
      loader.classList.remove("hidden");

      // Simulate 2 seconds of payment processing network delay
      await new Promise(resolve => setTimeout(resolve, 2000));

      // Proceed with actual booking API call
      try {
        const result = await api.post("/bookings", {
          show_id: showId,
          seats: selectedSeats,
        });
        
        // Add fake transaction ID
        result.transaction_id = "TXN" + Math.floor(100000000 + Math.random() * 900000000);
        
        sessionStorage.setItem("booking_confirmation", JSON.stringify(result));
        window.location.href = "/booking_confirm.html";
      } catch (e) {
        showToast(e.message, "error");
        closePaymentModal();
        // Reset modal state
        payBtn.style.display = "block";
        loader.classList.add("hidden");
      }
    }

    function toggleSeat(seatId, status) {
      if (status === "booked" || status === "locked") return;
      const idx = selectedSeats.indexOf(seatId);
      if (idx > -1) {
        selectedSeats.splice(idx, 1);
      } else {
        if (selectedSeats.length >= 10) {
          showToast("Maximum 10 seats per booking", "error");
          return;
        }
        selectedSeats.push(seatId);
      }
      updateSeatUI();
    }

    function updateSeatUI() {
      document.querySelectorAll(".seat").forEach(btn => {
        const seatId = btn.dataset.seat;
        const seatInfo = showData.seats.find(s => s.seat === seatId);
        const status = seatInfo ? seatInfo.status : "available";
        if (status === "booked" || status === "locked") return;
        btn.className = `seat ${selectedSeats.includes(seatId) ? "selected" : "available"}`;
      });

      const summary = document.getElementById("booking-summary");
      if (selectedSeats.length > 0) {
        summary.style.display = "flex";
        document.getElementById("selected-seats-display").innerHTML =
          selectedSeats.sort().map(s => `<span class="seat-tag">${s}</span>`).join("");
        document.getElementById("total-price").textContent =
          `₹${selectedSeats.length * showData.price}`;
      } else {
        summary.style.display = "none";
      }
    }



    loadSeatMap();
  </script>
  <script>lucide.createIcons();</script>
</body>
</html>
