<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CineBook — Book movie tickets online. Browse latest movies, choose seats, and book instantly.">
  <title>CineBook — Movie Ticket Booking</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">
        <span class="icon">🎬</span>
        <span>CINEBOOK</span>
      </a>
      <div class="nav-links">
        <a href="/" class="active">Movies</a>
        <a href="/my_bookings.html">My Bookings</a>
        <div id="auth-links"></div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="particle" style="top:20%;left:15%;animation-delay:0s;"></div>
    <div class="particle" style="top:60%;left:80%;animation-delay:2s;"></div>
    <div class="particle" style="top:30%;left:50%;animation-delay:4s;"></div>
    <div class="particle" style="top:75%;left:25%;animation-delay:1s;"></div>
    <div class="particle" style="top:40%;left:70%;animation-delay:3s;"></div>
    <div class="hero-content">
      <h1>Your Cinema, Your Seat</h1>
      <p>Browse the latest blockbusters, pick your perfect seat, and book your tickets in seconds.</p>
      <a href="#movies" class="btn btn-primary btn-lg">Browse Movies</a>
    </div>
  </section>

  <!-- Search & Filter -->
  <section class="section" id="movies">
    <div class="section-title">
      <span>🎥 Now Showing</span>
      <span class="line"></span>
    </div>

    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search movies...">
      </div>
      <div class="genre-tabs" id="genre-tabs">
        <button class="genre-tab active" data-genre="">All</button>
        <button class="genre-tab" data-genre="Action">Action</button>
        <button class="genre-tab" data-genre="Sci-Fi">Sci-Fi</button>
        <button class="genre-tab" data-genre="Drama">Drama</button>
        <button class="genre-tab" data-genre="Comedy">Comedy</button>
        <button class="genre-tab" data-genre="Horror">Horror</button>
        <button class="genre-tab" data-genre="Romance">Romance</button>
      </div>
    </div>

    <!-- Movie Grid -->
    <div class="movie-grid" id="movie-grid">
      <div class="spinner"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 CineBook. All rights reserved. Built with ❤️</p>
  </footer>

  <script src="/js/api.js"></script>
  <script>
    let allMovies = [];
    let activeGenre = "";
    let searchQuery = "";

    async function loadMovies() {
      try {
        allMovies = await api.get("/movies/");
        renderMovies();
      } catch (e) {
        document.getElementById("movie-grid").innerHTML =
          `<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;">Unable to load movies. Make sure the backend is running.</p>`;
      }
    }

    function renderMovies() {
      const grid = document.getElementById("movie-grid");
      let movies = allMovies;

      if (activeGenre) {
        movies = movies.filter(m => m.genre.toLowerCase().includes(activeGenre.toLowerCase()));
      }
      if (searchQuery) {
        movies = movies.filter(m => m.title.toLowerCase().includes(searchQuery.toLowerCase()));
      }

      if (movies.length === 0) {
        grid.innerHTML = `<p style="color:var(--text-muted);grid-column:1/-1;text-align:center;">No movies found.</p>`;
        return;
      }

      grid.innerHTML = movies.map(m => `
        <div class="card movie-card" onclick="goToMovie('${m.id}')">
          <div class="poster-wrap">
            <img src="${m.poster_url || 'https://via.placeholder.com/300x450/1a1f2e/6b7280?text=No+Poster'}" alt="${m.title}" loading="lazy">
            <div class="poster-overlay">
              <button class="btn btn-primary btn-sm">Book Now</button>
            </div>
          </div>
          <div class="movie-info">
            <div class="movie-title">${m.title}</div>
            <div class="movie-meta">
              <span class="badge badge-genre">${m.genre}</span>
              ${m.rating ? `<span class="star-rating">⭐ ${m.rating}</span>` : ""}
              ${m.duration ? `<span>${m.duration}</span>` : ""}
            </div>
          </div>
        </div>
      `).join("");
    }

    function goToMovie(id) {
      window.location.href = `/movie_detail.html?id=${id}`;
    }

    // Genre tabs
    document.getElementById("genre-tabs").addEventListener("click", e => {
      if (e.target.classList.contains("genre-tab")) {
        document.querySelectorAll(".genre-tab").forEach(t => t.classList.remove("active"));
        e.target.classList.add("active");
        activeGenre = e.target.dataset.genre;
        renderMovies();
      }
    });

    // Search
    document.getElementById("search-input").addEventListener("input", e => {
      searchQuery = e.target.value;
      renderMovies();
    });

    loadMovies();
  </script>
</body>
</html>
