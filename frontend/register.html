<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — CineBook</title>
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="auth-page">
    <div class="glass-card auth-card">
      <div class="text-center mb-2">
        <a href="/" class="logo font-display" style="font-size:2rem;letter-spacing:3px;justify-content:center;display:flex;gap:10px;align-items:center;">
          <span><i data-lucide="film" style="width:18px;"></i></span> CINEBOOK
        </a>
      </div>
      <h2>Create Account</h2>
      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Ganesh Kumar" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" id="reg-btn">Create Account</button>
      </form>
      <div class="footer-link">
        Already have an account? <a href="/login.html">Login</a>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("reg-btn");
      btn.disabled = true;
      btn.textContent = "Creating...";
      try {
        const data = await api.post("/auth/register", {
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        });
        api.setToken(data.token);
        api.setUser(data.user);
        showToast("Account created!", "success");
        setTimeout(() => window.location.href = "/", 500);
      } catch (err) {
        showToast(err.message, "error");
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    });
  </script>
  <script>lucide.createIcons();</script>
</body>
</html>
