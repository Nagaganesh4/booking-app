<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed — CineBook</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .confirm-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--gradient-hero); padding: 2rem; }
    .confirm-card { max-width: 500px; width: 100%; padding: 3rem 2.5rem; text-align: center; }
    .checkmark { width: 80px; height: 80px; border-radius: 50%; background: rgba(39,174,96,0.15); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2.5rem; animation: scaleIn 0.5s ease; }
    @keyframes scaleIn { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .confirm-card h2 { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; letter-spacing: 2px; color: var(--accent-green); margin-bottom: 0.5rem; }
    .confirm-card .subtitle { color: var(--text-secondary); margin-bottom: 2rem; }
    .ticket-info { text-align: left; background: var(--bg-input); border-radius: var(--radius-sm); padding: 1.5rem; margin-bottom: 2rem; }
    .ticket-info .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-color); }
    .ticket-info .row:last-child { border-bottom: none; }
    .ticket-info .label { color: var(--text-muted); font-size: 0.85rem; }
    .ticket-info .value { font-weight: 600; font-size: 0.95rem; }
    .ticket-info .value.gold { color: var(--accent-gold); font-family: 'Bebas Neue'; font-size: 1.3rem; }
    .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
    
    /* Printable Ticket Styles */
    #ticket-container {
      background: #fff;
      color: #000;
      width: 100%;
      max-width: 600px;
      margin: 2rem auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
      display: none; /* Hidden until rendered or printed */
    }
    .ticket-header { background: var(--bg-primary); color: #fff; padding: 1.5rem; text-align: center; }
    .ticket-header h2 { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; margin: 0; letter-spacing: 2px; color: var(--accent-gold); }
    .ticket-body { padding: 2rem; display: flex; gap: 2rem; background: #fff; }
    .ticket-details { flex: 1; text-align: left; }
    .ticket-qr { width: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 2px dashed #ccc; padding-left: 1.5rem; }
    .ticket-qr img { width: 100px; height: 100px; margin-bottom: 0.5rem; }
    .ticket-row { margin-bottom: 1rem; }
    .ticket-label { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .ticket-val { font-size: 1.1rem; font-weight: 700; color: #111; }
    .ticket-val.movie { font-size: 1.5rem; color: #000; font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }
    .cutout { position: absolute; width: 30px; height: 30px; background: var(--gradient-hero); border-radius: 50%; top: 50%; transform: translateY(-50%); }
    .cutout.left { left: -15px; }
    .cutout.right { right: -15px; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="confirm-page">
    <div class="glass-card confirm-card" id="confirm-card">
      <div class="spinner"></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const data = JSON.parse(sessionStorage.getItem("booking_confirmation") || "null");
    const card = document.getElementById("confirm-card");
    let globalTicketHTML = "";

    if (!data) {
      card.innerHTML = `<p style="color:var(--text-muted);">No booking data found.</p><a href="/" class="btn btn-primary mt-2">Back to Home</a>`;
    } else {
      const dt = data.show_datetime ? new Date(data.show_datetime) : null;
      const dateStr = dt ? dt.toLocaleDateString("en-IN", { weekday: "short", day: "numeric", month: "short", year: "numeric" }) : "—";
      const timeStr = dt ? dt.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" }) : "";

      card.innerHTML = `
        <div class="checkmark"><i data-lucide="check-circle" style="width:40px;height:40px;color:#27ae60;"></i></div>
        <h2>Booking Confirmed!</h2>
        <p class="subtitle">Your tickets have been booked successfully</p>
        <div class="ticket-info">
          <div class="row"><span class="label">Booking ID</span><span class="value">${data.booking_id || "—"}</span></div>
          <div class="row"><span class="label">Transaction ID</span><span class="value">${data.transaction_id || "—"}</span></div>
          <div class="row"><span class="label">Movie</span><span class="value">${data.movie_title || "—"}</span></div>
          <div class="row"><span class="label">Theater</span><span class="value">${data.theater_name || "—"}</span></div>
          <div class="row"><span class="label">Date & Time</span><span class="value">${dateStr} ${timeStr}</span></div>
          <div class="row"><span class="label">Seats</span><span class="value">${(data.seats || []).join(", ")}</span></div>
          <div class="row"><span class="label">Total Paid</span><span class="value gold">₹${data.total_price || 0}</span></div>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="downloadTicket()">Download PDF Ticket</button>
          <a href="/my_bookings.html" class="btn btn-ghost">View My Bookings</a>
        </div>
      `;

      // Build ticket HTML string for PDF generation
      globalTicketHTML = `
        <div style="background:#fff; color:#000; width:800px; height:350px; font-family:sans-serif; box-sizing: border-box; overflow: hidden;">
          <div style="background:#0a0e17; padding:20px; text-align:center;">
            <h1 style="color:#f5a623; margin:0; font-family:'Bebas Neue', cursive; font-size:36px; letter-spacing:3px;">CINEBOOK</h1>
            <p style="color:#fff; margin:5px 0 0 0; font-size:14px;">Official Movie Ticket</p>
          </div>
          <div style="padding:30px; display:flex; justify-content:space-between;">
            <div style="flex:1;">
              <div style="margin-bottom:15px;">
                <div style="font-size:12px; color:#666; text-transform:uppercase;">Movie</div>
                <div style="font-size:24px; font-weight:bold; font-family:'Bebas Neue', cursive;">${data.movie_title || "—"}</div>
              </div>
              <div style="margin-bottom:15px;">
                <div style="font-size:12px; color:#666; text-transform:uppercase;">Theater</div>
                <div style="font-size:16px; font-weight:bold;">${data.theater_name || "—"}</div>
              </div>
              <div style="display:flex; gap:30px; margin-bottom:15px;">
                <div>
                  <div style="font-size:12px; color:#666; text-transform:uppercase;">Date</div>
                  <div style="font-size:16px; font-weight:bold;">${dateStr}</div>
                </div>
                <div>
                  <div style="font-size:12px; color:#666; text-transform:uppercase;">Time</div>
                  <div style="font-size:16px; font-weight:bold;">${timeStr}</div>
                </div>
              </div>
              <div style="display:flex; gap:30px;">
                <div>
                  <div style="font-size:12px; color:#666; text-transform:uppercase;">Seats</div>
                  <div style="font-size:16px; font-weight:bold; color:#27ae60;">${(data.seats || []).join(", ")}</div>
                </div>
                <div>
                  <div style="font-size:12px; color:#666; text-transform:uppercase;">Amount Paid</div>
                  <div style="font-size:16px; font-weight:bold;">₹${data.total_price || 0}</div>
                </div>
              </div>
            </div>
            <div style="width:120px; border-left:2px dashed #ccc; padding-left:20px; text-align:center; display:flex; flex-direction:column; justify-content:center;">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${data.booking_id}" alt="QR Code" style="width:100px; height:100px; margin-bottom:10px;">
              <div style="font-size:10px; color:#666;">ID: ${data.booking_id.substring(0,8).toUpperCase()}</div>
            </div>
          </div>
        </div>
      `;

      sessionStorage.removeItem("booking_confirmation");
    }

    function downloadTicket() {
      if (!globalTicketHTML) return;
      
      const opt = {
        margin:       0.5,
        filename:     `CineBook_Ticket_${data.booking_id.substring(0,6)}.pdf`,
        image:        { type: 'jpeg', quality: 1.0 },
        html2canvas:  { scale: 2, useCORS: true, windowWidth: 1000, windowHeight: 800 },
        jsPDF:        { unit: 'in', format: 'letter', orientation: 'landscape' }
      };
      
      const btn = document.querySelector(".btn-primary");
      const originalText = btn.textContent;
      btn.textContent = "Generating PDF...";
      btn.disabled = true;

      // Pass the HTML string directly. html2pdf handles the mounting internally.
      // Explicit windowWidth/windowHeight prevents clipping inside the internal iframe.
      html2pdf().set(opt).from(globalTicketHTML).save().then(() => {
        btn.textContent = originalText;
        btn.disabled = false;
      }).catch(err => {
        console.error("PDF generation failed", err);
        btn.textContent = originalText;
        btn.disabled = false;
        alert("Failed to generate PDF. Please try again.");
      });
    }
  </script>
  <script>lucide.createIcons();</script>
</body>
</html>
